# Blueprint de Render para Campus Norma — modo gratis ($0/mes).
# DB en Turso, storage en Supabase, frontend en Vercel (NO en este blueprint).
# Esta config solo crea el backend. Para deploy frontend ver vercel.json.

services:
  # Backend: Express + Socket.IO. Plan free porque la DB y los uploads
  # viven afuera (Turso + Supabase Storage), entonces no necesita disco.
  - type: web
    name: campus-norma-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@campusnorma.com
      - key: ADMIN_PASSWORD
        sync: false
      # --- Turso (DB) ---
      - key: TURSO_DATABASE_URL
        sync: false  # libsql://tu-db.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false
      # --- Supabase Storage (videos, PDFs) ---
      - key: SUPABASE_URL
        sync: false  # https://xxx.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: uploads
      # --- MercadoPago (pagos) ---
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      # --- URLs publicas ---
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      # --- Email (opcional, recomendado) ---
      # Sin esto, los emails se loggean. Con RESEND_API_KEY se mandan reales.
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false  # ej: "Campus Norma <noreply@tudominio.com>"
